name: Daily Pipeline

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      force_dream:
        description: "Force dream agent (bypass accumulation gate)"
        type: boolean
        default: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run research agent
        run: uv run python run.py research
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Run dream agent
        run: |
          if [ "${{ inputs.force_dream }}" = "true" ]; then
            uv run python run.py dream --force
          else
            uv run python run.py dream
          fi
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Run publish agent
        run: uv run python run.py publish

      - name: Commit and push
        run: |
          git config user.name "solarphunk-bot"
          git config user.email "bot@solarphunk.github.io"
          git add research/ state/ drafts/ site/content/posts/
          git diff --staged --quiet || git commit -m "pipeline: $(date -u +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failure: ${new Date().toISOString().split('T')[0]}`,
              body: `The daily pipeline failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            })
