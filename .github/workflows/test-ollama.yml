name: Test Ollama (Python)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Probe path accessibility
        run: |
          echo "=== /api/tags (GET) ==="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_CLIENT_SECRET }}" \
            https://infer.dayjob.dev/api/tags

          echo "=== /v1/models (GET) ==="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_CLIENT_SECRET }}" \
            https://infer.dayjob.dev/v1/models

          echo "=== /v1/chat/completions (POST, curl) ==="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_CLIENT_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"model":"qwen3:8b","messages":[{"role":"user","content":"say OK"}],"stream":false,"max_tokens":16}' \
            https://infer.dayjob.dev/v1/chat/completions

      - name: Test via Python OpenAI SDK
        run: |
          uv run python - <<'EOF'
          import os
          from openai import OpenAI

          cf_id = os.environ.get("CF_CLIENT_ID", "")
          cf_secret = os.environ.get("CF_CLIENT_SECRET", "")
          extra_headers = {}
          if cf_id:
              extra_headers["CF-Access-Client-Id"] = cf_id
          if cf_secret:
              extra_headers["CF-Access-Client-Secret"] = cf_secret

          client = OpenAI(base_url="https://infer.dayjob.dev/v1", api_key="ollama")

          response = client.chat.completions.create(
              model="qwen3:8b",
              max_tokens=16,
              messages=[{"role": "user", "content": "Reply with just: OK"}],
              extra_headers=extra_headers or None,
          )
          print(f"Response: {response.choices[0].message.content}")
          print("SUCCESS")
          EOF
        env:
          CF_CLIENT_ID: ${{ secrets.CF_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
