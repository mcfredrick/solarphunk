<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Sun core -->
  <circle cx="16" cy="16" r="6" fill="#c8883a"/>
  <!-- Leaf-petal rays — 8 petals, alternating sizes -->
  <!-- Top -->
  <ellipse cx="16" cy="6.5" rx="2" ry="4" fill="#c8883a" transform="rotate(0 16 16)"/>
  <!-- Top-right -->
  <ellipse cx="16" cy="6.5" rx="1.4" ry="3" fill="#c8883a" transform="rotate(45 16 16)"/>
  <!-- Right -->
  <ellipse cx="16" cy="6.5" rx="2" ry="4" fill="#c8883a" transform="rotate(90 16 16)"/>
  <!-- Bottom-right -->
  <ellipse cx="16" cy="6.5" rx="1.4" ry="3" fill="#c8883a" transform="rotate(135 16 16)"/>
  <!-- Bottom -->
  <ellipse cx="16" cy="6.5" rx="2" ry="4" fill="#c8883a" transform="rotate(180 16 16)"/>
  <!-- Bottom-left -->
  <ellipse cx="16" cy="6.5" rx="1.4" ry="3" fill="#c8883a" transform="rotate(225 16 16)"/>
  <!-- Left -->
  <ellipse cx="16" cy="6.5" rx="2" ry="4" fill="#c8883a" transform="rotate(270 16 16)"/>
  <!-- Top-left -->
  <ellipse cx="16" cy="6.5" rx="1.4" ry="3" fill="#c8883a" transform="rotate(315 16 16)"/>
  <!-- Inner glow core -->
  <circle cx="16" cy="16" r="4.5" fill="#e8a855"/>
</svg>
